type: custom:lawn-vision-card
title: Lawn Vision
background_image: /local/community/lawn-vision/rasen.png
background_position: center
background_size: cover
layout: auto
size: normal
show_agro: true
show_forecast: true
show_timeline: true
show_recommendation: true
visual:
  density: normal
  accent_color: "#42d65d"
  water_color: "#46a2ff"
  warning_color: "#f4b72f"
  card_radius: 16
  section_radius: 12
  overlay_opacity: 0.78
  vignette_opacity: 0.16
  panel_opacity: 0.76
  blur: 16
  text_scale: 1
  min_height: 0
