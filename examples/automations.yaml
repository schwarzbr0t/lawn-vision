# Sample automations that consume Lawn Vision care guide sensors.
# Drop into your automations.yaml or split into separate files and
# adjust entity ids to match your setup.

# Notify the household when a care action becomes due
- alias: "Lawn Vision: notify when an action is due"
  description: >
    Fires when the headline action changes to a concrete recommendation
    (mow / water / fertilize / scarify / aerate / overseed).
  trigger:
    - platform: state
      entity_id: sensor.lawn_vision_next_action
      to: ~
  condition:
    - condition: template
      value_template: >
        {{ trigger.to_state.state not in ['none', 'unknown', 'unavailable'] }}
    - condition: template
      value_template: >
        {{ trigger.from_state.state != trigger.to_state.state }}
  action:
    - service: notify.persistent_notification
      data:
        title: "Lawn Vision"
        message: >-
          Heute steht an: {{ state_attr('sensor.lawn_vision_next_action', 'reason') or
          trigger.to_state.state }}.
          Fenster: {{ state_attr('sensor.lawn_vision_next_action', 'next_window') }}.

# Record last-mow timestamp when the robot mower returns to its dock
- alias: "Lawn Vision: log last mow when mower docks"
  description: >
    Updates the input_datetime helper that Lawn Vision uses to compute
    the mow cooldown. Replace lawn_mower.husqvarna with your mower
    entity.
  trigger:
    - platform: state
      entity_id: lawn_mower.husqvarna
      to: docked
      from:
        - mowing
        - returning
  action:
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.lawn_last_mow
      data:
        datetime: "{{ now().isoformat() }}"

# Run the irrigation when watering is due and no rain is forecast
- alias: "Lawn Vision: smart irrigation"
  description: >
    Runs an irrigation switch when the water action is do_now,
    rain risk is below 50% and the lawn is not stressed.
    Replace switch.lawn_irrigation with your irrigation entity.
  trigger:
    - platform: state
      entity_id: sensor.lawn_vision_action_water
      to: do_now
  condition:
    - condition: numeric_state
      entity_id: sensor.lawn_vision_forecast_rain_risk
      below: 50
    - condition: numeric_state
      entity_id: sensor.lawn_vision_stress_level
      below: 65
    - condition: time
      after: "18:00:00"
      before: "22:00:00"
  action:
    - service: switch.turn_on
      target:
        entity_id: switch.lawn_irrigation
    - delay: "00:30:00"
    - service: switch.turn_off
      target:
        entity_id: switch.lawn_irrigation
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.lawn_last_water
      data:
        datetime: "{{ now().isoformat() }}"

# Remind once when the fertilize window opens
- alias: "Lawn Vision: fertilize reminder"
  description: >
    Daily check at 8am: if fertilize is do_now and the household has
    not been notified in the last 7 days, send a reminder.
  trigger:
    - platform: time
      at: "08:00:00"
  condition:
    - condition: state
      entity_id: sensor.lawn_vision_action_fertilize
      state: do_now
  action:
    - service: notify.mobile_app_phone
      data:
        title: "Duengezeit"
        message: >-
          {{ state_attr('sensor.lawn_vision_action_fertilize', 'reason') }}
          Fenster: {{ state_attr('sensor.lawn_vision_action_fertilize', 'next_window') }}.

# Pause the mower when the lawn needs to be spared
- alias: "Lawn Vision: pause mower on stress"
  description: >
    When the stress level rises above 65 or mowing is "skip", pause
    a scheduled mowing job. Replace lawn_mower.husqvarna with your mower.
  trigger:
    - platform: numeric_state
      entity_id: sensor.lawn_vision_stress_level
      above: 65
    - platform: state
      entity_id: sensor.lawn_vision_action_mow
      to: skip
  action:
    - service: lawn_mower.pause
      target:
        entity_id: lawn_mower.husqvarna
    - service: notify.persistent_notification
      data:
        title: "Maehroboter pausiert"
        message: >-
          {{ state_attr('sensor.lawn_vision_action_mow', 'reason') }}
